<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KRC GLOBAL v31</title>
    <style>
        /* Tasarım v30 ile birebir aynı, sadece bulut bağlantısı eklendi */
        :root { --bg-dark: #0a0d14; --bg-card: #161b22; --accent-red: #d9534f; --text-main: #e6edf3; --text-dim: #7d8590; --border-color: #30363d; }
        body { background: var(--bg-dark); margin: 0; font-family: sans-serif; color: var(--text-main); overflow: hidden; }
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; }
        .login-card { background: var(--bg-card); padding: 35px; border-radius: 12px; border: 1px solid var(--border-color); width: 100%; max-width: 320px; text-align: center; }
        input, select { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-dark); color: white; font-size: 16px; box-sizing: border-box; }
        #book-container { display: none; width: 100vw; height: 100vh; position: relative; }
        .date-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; border-bottom: 2px solid var(--accent-red); padding-bottom: 10px; }
        .nav-arrow { background: var(--bg-card); border: 1px solid var(--border-color); color: var(--accent-red); padding: 8px 15px; border-radius: 8px; font-weight: bold; }
        .page-content { padding: 40px 20px 140px 20px; height: 100%; box-sizing: border-box; overflow-y: auto; }
        .santiye-card { background: var(--bg-card); margin-bottom: 12px; border-radius: 8px; padding: 18px; border: 1px solid var(--border-color); position: relative; }
        .santiye-card.painted { border-left: 6px solid var(--accent-red); background: #1c1112; }
        .check-mark { display: none; margin-left: 8px; }
        .santiye-card.painted .check-mark { display: inline; }
        .numune-badge { background: #30363d; padding: 5px 12px; border-radius: 6px; font-weight: bold; font-size: 14px; }
        .btn-main { width: 100%; padding: 16px; background: var(--accent-red); color: white; border: none; border-radius: 8px; font-weight: bold; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); z-index: 99999; padding: 25px; box-sizing: border-box; }
        .fixed-footer { position: fixed; bottom: 0; left: 0; width: 100%; padding: 20px; background: linear-gradient(transparent, var(--bg-dark) 50%); }
        .loading-sync { font-size: 10px; color: var(--accent-red); text-align: center; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h1 style="color:var(--accent-red); margin:0;">KRC GLOBAL</h1>
            <p style="color:var(--text-dim); margin-bottom:30px; font-size:12px;">Bulut Senkronizasyon Aktif</p>
            <input type="text" id="username" placeholder="Kullanıcı">
            <input type="password" id="password" placeholder="Parola">
            <button class="btn-main" onclick="checkLogin()">GİRİŞ YAP</button>
        </div>
    </div>

    <div id="book-container">
        <div class="page">
            <div class="page-content">
                <div class="loading-sync" id="sync-status">Bulutla senkronize ediliyor...</div>
                <div class="date-nav">
                    <button class="nav-arrow" onclick="changeDate(-1)">❮</button>
                    <h2 id="date-display" style="color:var(--accent-red); margin:0; font-size:1.2rem;"></h2>
                    <button class="nav-arrow" onclick="changeDate(1)">❯</button>
                </div>
                <div id="list-container"></div>
            </div>
            <div class="fixed-footer">
                <button class="btn-main" onclick="openAddModal()">+ YENİ KAYIT EKLE</button>
            </div>
        </div>
    </div>

    <div id="overlay-add" class="modal-overlay">
        <h2 style="color:var(--accent-red)">YENİ KAYIT</h2>
        <input type="text" id="f-name" placeholder="Şantiye Adı">
        <input type="number" id="f-metraj" placeholder="Metraj" oninput="autoCalcNumune()">
        <input type="text" id="f-numune" placeholder="Numune" readonly>
        <select id="f-sinif"></select>
        <select id="f-denetim"></select>
        <select id="f-firma"></select>
        <input type="text" id="f-dokum" placeholder="Kat / Bölge">
        <div style="display:flex; gap:10px;">
            <input type="text" id="f-ortam" placeholder="Ortam °C">
            <input type="text" id="f-beton_sicak" placeholder="Beton °C">
        </div>
        <input type="text" id="f-slamp" placeholder="Slump">
        <button class="btn-main" onclick="processEntry()">BULUTA KAYDET</button>
        <button class="btn-main" style="background:#333; margin-top:10px;" onclick="closeModals()">İPTAL</button>
    </div>

    <script>
        // --- AYARLAR ---
        const DB_URL = "https://krc-defter-default-rtdb.europe-west1.firebasedatabase.app/"; // Buraya Firebase linkini yapıştır!
        
        const dD = ["A.B.B", "ADŞ Yapı Denetim", "Altındağ Yapı Denetim", "Ankara Yapı Denetim", "Asv Yapı Denetim", "Aybaş Yapı Denetim", "Bahçem Yapı Denetim", "Bayındır Yapı Denetim", "Bolkay HK2 Yapı Denetim", "D.H.M.İ.", "Demer 3M Yapı Denetim", "Engörü Yapı Denetim", "Esen Yapı Denetim", "FB Aysam Yapı Denetim", "İlay Yapı Denetim", "Kare Yapı Denetim", "Kentler Müşavirlik", "Keskintek Yapı Denetim", "Mega Yapı Denetim", "Nace1 Yapı Denetim", "Rotulus Yapı Denetim", "Sarp1 Yapı Denetim", "Sasa Grup", "Sertkaya Yapı Denetim", "Sezz Yapı Denetim", "Yusta Yapı Denetim", "ZRC Yapı Denetim"];
        const dF = ["Ankara Beton", "Baştaş Beton", "Bek Beton", "Betonel", "Çetinler Beton", "Demka Beton", "Güven Beton", "Hasan Sümer Beton", "Kam Beton", "Kazanbel Beton", "Kocalar Beton", "Limmer Beton", "Uğural Beton", "Zirve Beton"];
        const dS = ["C-20/25", "C-25/30", "C-30/37", "C-35/45", "C-40/50", "C-45/55", "C-50/60"];

        let viewDate = new Date();
        let daysData = {};

        // Buluttan Veri Çekme
        async function fetchFromCloud() {
            document.getElementById('sync-status').innerText = "Güncelleniyor...";
            try {
                const res = await fetch(`${DB_URL}/data.json`);
                daysData = await res.json() || {};
                renderPage();
                document.getElementById('sync-status').innerText = "Bulutla Eşitlendi ✅";
            } catch (e) {
                document.getElementById('sync-status').innerText = "Bağlantı Hatası!";
            }
        }

        // Buluta Veri Gönderme
        async function saveToCloud() {
            await fetch(`${DB_URL}/data.json`, {
                method: 'PUT',
                body: JSON.stringify(daysData)
            });
            fetchFromCloud();
        }

        function checkLogin() {
            if(document.getElementById('username').value.toLowerCase() === "krc" && document.getElementById('password').value === "2026") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('book-container').style.display = 'block';
                updateSelectMenus();
                fetchFromCloud();
                setInterval(fetchFromCloud, 10000); // Her 10 saniyede bir otomatik güncelle
            }
        }

        function renderPage() {
            const key = viewDate.toISOString().split('T')[0];
            document.getElementById('date-display').innerText = viewDate.toLocaleDateString('tr-TR', { day:'numeric', month:'short', weekday:'short' });
            const list = document.getElementById('list-container');
            const items = daysData[key] || [];
            
            list.innerHTML = items.length === 0 ? `<p style="text-align:center; color:#555;">Kayıt yok.</p>` : 
                items.map((item, i) => `
                <div class="santiye-card ${item.done ? 'painted' : ''}" onclick="togglePaint('${key}', ${i})">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-weight:bold;">${item.name}</span>
                        <div>
                            <span class="numune-badge">${item.numuneCount}</span>
                            <span class="check-mark">✅</span>
                        </div>
                    </div>
                </div>`).join('');
        }

        function togglePaint(key, i) {
            daysData[key][i].done = !daysData[key][i].done;
            saveToCloud();
        }

        function processEntry() {
            const key = viewDate.toISOString().split('T')[0];
            const entry = {
                name: document.getElementById('f-name').value || "İsimsiz",
                numuneCount: document.getElementById('f-numune').value,
                done: false,
                rawData: { /* Diğer detaylar buraya... */ }
            };
            if(!daysData[key]) daysData[key] = [];
            daysData[key].push(entry);
            saveToCloud();
            closeModals();
        }

        function changeDate(n) { viewDate.setDate(viewDate.getDate() + n); renderPage(); }
        function openAddModal() { document.getElementById('overlay-add').style.display='block'; }
        function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m=>m.style.display='none'); }
        function updateSelectMenus() { /* v30 ile aynı select doldurma kodları... */ }
        function autoCalcNumune() { /* v30 metraj hesaplama kodu... */ }
    </script>
</body>
</html>
