<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; script-src * 'unsafe-inline' 'unsafe-eval'; connect-src * 'unsafe-inline';">
    <title>KRC YAPI LABORATUVARI</title>
    <style>
        :root { --bg-dark: #0a0d14; --bg-card: #161b22; --accent-red: #d9534f; --text-main: #e6edf3; --text-dim: #7d8590; --border-color: #30363d; --success-green: #2ea043; }
        body { background: var(--bg-dark); margin: 0; padding: 0; font-family: -apple-system, sans-serif; color: var(--text-main); overflow: hidden; touch-action: manipulation; }
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; box-sizing: border-box; }
        .login-card { background: var(--bg-card); padding: 35px; border-radius: 12px; border: 1px solid var(--border-color); width: 100%; max-width: 320px; text-align: center; }
        input, select, textarea { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-dark); color: white; font-size: 16px; box-sizing: border-box; outline: none; }
        #book-container { display: none; width: 100vw; height: 100vh; position: relative; }
        .date-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; border-bottom: 2px solid var(--accent-red); padding-bottom: 10px; }
        .date-header { font-size: 1.2rem; font-weight: 900; color: var(--accent-red); text-transform: uppercase; margin: 0; }
        .nav-arrow { background: var(--bg-card); border: 1px solid var(--border-color); color: var(--accent-red); padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .page-content { padding: 30px 20px 140px 20px; height: 100%; box-sizing: border-box; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .sync-status { font-size: 10px; color: var(--text-dim); text-align: center; margin-bottom: 10px; }
        
        /* Şantiye Kartı ve Butonlar */
        .santiye-card { background: var(--bg-card); margin-bottom: 12px; border-radius: 8px; padding: 15px; border: 1px solid var(--border-color); position: relative; }
        .santiye-card.painted { border-left: 6px solid var(--success-green); background: #121d14; }
        .card-main { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .card-info { flex: 1; }
        .card-actions { display: flex; gap: 8px; margin-top: 10px; border-top: 1px solid var(--border-color); padding-top: 10px; }
        .action-btn { flex: 1; padding: 10px; border-radius: 6px; border: none; font-size: 12px; font-weight: bold; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-view { background: #30363d; }
        .btn-done { background: var(--success-green); }
        .btn-delete { background: #442d2d; color: #ff7b72; }
        
        .numune-badge { background: #30363d; color: var(--text-main); padding: 5px 12px; border-radius: 6px; font-weight: bold; font-size: 14px; }
        .btn-main { width: 100%; padding: 16px; background: var(--accent-red); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); z-index: 99999; }
        .modal { width: 100%; height: 100%; padding: 25px; box-sizing: border-box; overflow-y: auto; }
        .fixed-footer { position: fixed; bottom: 0; left: 0; width: 100%; padding: 20px; background: linear-gradient(transparent, var(--bg-dark) 60%); box-sizing: border-box; display: flex; gap: 10px; }
        .view-detail-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border-color); }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h1 style="color:var(--accent-red); margin:0;">KRC YAPI LABORATUVARI</h1>
            <p style="color:var(--text-dim); margin-bottom:30px; font-size:13px;">Numune Kayıt Defteri</p>
            <input type="text" id="username" placeholder="Kullanıcı">
            <input type="password" id="password" placeholder="Parola">
            <button class="btn-main" onclick="checkLogin()">GİRİŞ</button>
        </div>
    </div>

    <div id="book-container">
        <div class="page-content">
            <div class="sync-status" id="sync-status">Bağlanıyor...</div>
            <div class="date-nav">
                <button class="nav-arrow" onclick="changeDate(-1)">❮</button>
                <h2 id="date-header" class="date-header">Yükleniyor...</h2>
                <button class="nav-arrow" onclick="changeDate(1)">❯</button>
            </div>
            <div id="list-container"></div>
        </div>
        <div class="fixed-footer">
            <button class="btn-main" onclick="openAddModal()">+ YENİ ŞANTİYE</button>
            <button class="btn-main" style="background:#30363d; width: 60px;" onclick="openSettings()">⚙️</button>
        </div>
    </div>

    <div id="overlay-add" class="modal-overlay">
        <div class="modal">
            <h2 id="modal-title" style="color:var(--accent-red)">YENİ KAYIT</h2>
            <div style="padding-bottom:120px;">
                <input type="text" id="f-name" placeholder="Şantiye Adı">
                <input type="number" id="f-metraj" placeholder="Metraj (m³)" oninput="autoCalcNumune()">
                <input type="text" id="f-numune" placeholder="Numune Sayısı" readonly style="opacity:0.6">
                <select id="f-sinif"></select>
                <select id="f-denetim"></select>
                <select id="f-firma"></select>
                <input type="text" id="f-dokum" placeholder="Kat / Bölge">
                <div style="display:flex; gap:10px;"><input type="text" id="f-ortam" placeholder="Ortam °C"><input type="text" id="f-beton_sicak" placeholder="Beton °C"></div>
                <input type="text" id="f-slamp" placeholder="Slump (cm)">
            </div>
            <div style="position:fixed; bottom:0; left:0; width:100%; padding:20px; background:var(--bg-dark); display:flex; gap:10px; box-sizing:border-box;">
                <button id="modal-save-btn" class="btn-main" onclick="processEntry()">KAYDET</button>
                <button class="btn-main" style="background:#30363d;" onclick="closeModals()">İPTAL</button>
            </div>
        </div>
    </div>

    <div id="overlay-view" class="modal-overlay">
        <div class="modal">
            <h2 id="view-name" style="color:var(--accent-red); margin-bottom:20px;"></h2>
            <div id="view-details-content"></div>
            <button class="btn-main" style="background:#30363d; margin-top:30px;" onclick="closeModals()">KAPAT</button>
        </div>
    </div>

    <script>
        const DB_URL = "https://krc-defter-default-rtdb.europe-west1.firebasedatabase.app/"; 
        let config = { 
            denetim: ["A.B.B", "ADŞ Yapı Denetim", "Ankara Yapı Denetim", "Keskintek Yapı Denetim", "ZRC Yapı Denetim"],
            firma: ["Ankara Beton", "Baştaş Beton", "Bek Beton", "Betonel", "Çetinler Beton", "Güven Beton", "Limmer Beton", "Uğural Beton", "Zirve Beton"],
            sinif: ["C-20/25", "C-25/30", "C-30/37", "C-35/45", "C-40/50", "C-45/55", "C-50/60"]
        };
        let daysData = {}; let viewDate = new Date();
        let isSyncing = false; let editingIndex = null;

        async function fetchFromCloud() {
            if (isSyncing) return;
            try {
                const res = await fetch(`${DB_URL}/data.json`);
                const allData = await res.json() || {};
                daysData = allData.records || {};
                if(allData.config) config = allData.config;
                renderPage();
                document.getElementById('sync-status').innerText = "Bulut Aktif ✅";
            } catch (e) { document.getElementById('sync-status').innerText = "Bağlantı Kesik!"; }
        }

        async function saveToCloud() {
            isSyncing = true;
            document.getElementById('sync-status').innerText = "GÜNCELLENİYOR...";
            try {
                await fetch(`${DB_URL}/data.json`, { 
                    method: 'PUT', 
                    body: JSON.stringify({ records: daysData, config: config }) 
                });
                document.getElementById('sync-status').innerText = "BULUT GÜNCEL ✅";
            } catch (e) { alert("Hata!"); }
            setTimeout(() => { isSyncing = false; }, 2000);
        }

        function checkLogin() {
            if(document.getElementById('username').value.toLowerCase() === "krc" && document.getElementById('password').value === "2026") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('book-container').style.display = 'block';
                updateSelectMenus(); fetchFromCloud();
                setInterval(fetchFromCloud, 10000);
            } else { alert("Hatalı!"); }
        }

        function renderPage() {
            const key = viewDate.toISOString().split('T')[0];
            document.getElementById('date-header').innerText = viewDate.toLocaleDateString('tr-TR', { day:'numeric', month:'short', weekday:'short' });
            const items = daysData[key] || [];
            const container = document.getElementById('list-container');
            
            container.innerHTML = items.length ? items.map((item, i) => `
                <div class="santiye-card ${item.done ? 'painted' : ''}">
                    <div class="card-main">
                        <div class="card-info">
                            <div style="font-weight:bold; font-size:18px;">${item.name}</div>
                            <div style="font-size:12px; color:var(--text-dim); margin-top:4px;">${item.details?.firma || '-'} / ${item.details?.sinif || '-'}</div>
                        </div>
                        <span class="numune-badge">${item.numuneCount}</span>
                    </div>
                    <div class="card-actions">
                        <button class="action-btn btn-view" onclick="viewDetail(${i})">👁️ DETAY</button>
                        <button class="action-btn btn-view" onclick="editEntry(${i})">✏️ DÜZENLE</button>
                        <button class="action-btn btn-done" onclick="togglePaint('${key}', ${i})">${item.done ? '↩️ GERİ' : '✅ TİK'}</button>
                        <button class="action-btn btn-delete" onclick="deleteEntry(${i})">🗑️</button>
                    </div>
                </div>`).join('') : '<p style="text-align:center; color:var(--text-dim); margin-top:40px;">Kayıt yok.</p>';
        }

        function viewDetail(i) {
            const key = viewDate.toISOString().split('T')[0];
            const item = daysData[key][i];
            document.getElementById('view-name').innerText = item.name;
            document.getElementById('view-details-content').innerHTML = `
                <div class="view-detail-row"><span>Metraj:</span><span>${item.numuneCount} Numune</span></div>
                <div class="view-detail-row"><span>Firma:</span><span>${item.details?.firma || '-'}</span></div>
                <div class="view-detail-row"><span>Denetim:</span><span>${item.details?.denetim || '-'}</span></div>
                <div class="view-detail-row"><span>Sınıf:</span><span>${item.details?.sinif || '-'}</span></div>
                <div class="view-detail-row"><span>Bölge:</span><span>${item.details?.dokum || '-'}</span></div>
                <div class="view-detail-row"><span>Ortam / Beton °C:</span><span>${item.details?.ortam || '-'} / ${item.details?.beton || '-'}</span></div>
                <div class="view-detail-row"><span>Slump:</span><span>${item.details?.slump || '-'} cm</span></div>
            `;
            document.getElementById('overlay-view').style.display = 'block';
        }

        async function processEntry() {
            const key = viewDate.toISOString().split('T')[0];
            if(!daysData[key]) daysData[key] = [];
            
            const data = {
                name: document.getElementById('f-name').value || "İsimsiz",
                numuneCount: document.getElementById('f-numune').value || "0",
                done: editingIndex !== null ? daysData[key][editingIndex].done : false,
                details: {
                    ortam: document.getElementById('f-ortam').value,
                    beton: document.getElementById('f-beton_sicak').value,
                    slump: document.getElementById('f-slamp').value,
                    firma: document.getElementById('f-firma').value,
                    denetim: document.getElementById('f-denetim').value,
                    sinif: document.getElementById('f-sinif').value,
                    dokum: document.getElementById('f-dokum').value
                }
            };

            if(editingIndex !== null) daysData[key][editingIndex] = data;
            else daysData[key].push(data);
            
            renderPage(); closeModals(); await saveToCloud();
        }

        function editEntry(i) {
            editingIndex = i;
            const key = viewDate.toISOString().split('T')[0];
            const item = daysData[key][i];
            document.getElementById('modal-title').innerText = "DÜZENLE";
            document.getElementById('f-name').value = item.name;
            document.getElementById('f-numune').value = item.numuneCount;
            document.getElementById('f-ortam').value = item.details?.ortam || "";
            document.getElementById('f-beton_sicak').value = item.details?.beton || "";
            document.getElementById('f-slamp').value = item.details?.slump || "";
            document.getElementById('f-firma').value = item.details?.firma || "";
            document.getElementById('f-denetim').value = item.details?.denetim || "";
            document.getElementById('f-sinif').value = item.details?.sinif || "C-25/30";
            document.getElementById('f-dokum').value = item.details?.dokum || "";
            document.getElementById('overlay-add').style.display = 'block';
        }

        async function deleteEntry(i) {
            if(confirm("Bu şantiyeyi silmek istediğine emin misin?")) {
                const key = viewDate.toISOString().split('T')[0];
                daysData[key].splice(i, 1);
                renderPage(); await saveToCloud();
            }
        }

        async function togglePaint(key, i) { 
            daysData[key][i].done = !daysData[key][i].done; 
            renderPage(); await saveToCloud(); 
        }

        function openAddModal() { 
            editingIndex = null; 
            document.getElementById('modal-title').innerText = "YENİ KAYIT";
            document.querySelectorAll('#overlay-add input').forEach(i=>i.value="");
            document.getElementById('overlay-add').style.display='block'; 
        }
        
        function updateSelectMenus() {
            document.getElementById('f-sinif').innerHTML = config.sinif.map(i=>`<option value="${i}">${i}</option>`).join('');
            document.getElementById('f-denetim').innerHTML = `<option value="">Yapı Denetim...</option>` + config.denetim.sort().map(i=>`<option value="${i}">${i}</option>`).join('');
            document.getElementById('f-firma').innerHTML = `<option value="">Firma...</option>` + config.firma.sort().map(i=>`<option value="${i}">${i}</option>`).join('');
        }

        function autoCalcNumune() {
            const m = parseFloat(document.getElementById('f-metraj').value);
            let num = (m<=24)?8:(m<=100)?12:(m<=150)?16:(m<=200)?20:(m<=250)?24:(m<=300)?28:(m<=400)?32:(m<=500)?36:(m<=600)?40:40+(Math.ceil((m-600)/200)*4);
            document.getElementById('f-numune').value = num;
        }
        
        function changeDate(n) { viewDate.setDate(viewDate.getDate() + n); renderPage(); }
        function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m=>m.style.display='none'); }
    </script>
</body>
</html>
